# BREAK-IT variant: the SAME slow-booting app (20s before it serves), but with
# a liveness probe and NO startupProbe. The liveness probe is an HTTP GET to
# /healthz with a tiny initialDelay and a tiny failureThreshold. agnhost is not
# even listening yet during the 20s sleep, so the probe fails repeatedly, the
# kubelet kills the container before boot finishes, and you get CrashLoopBackOff
# thrash — the app is never allowed to start.
#
# The fix (you apply it in the lab) is to add the startupProbe from
# app-probed.yaml so liveness is suppressed until boot completes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-crash
  labels:
    app.kubernetes.io/name: health-crash
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "03"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: health-crash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: health-crash
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "03"
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: app
          image: registry.k8s.io/e2e-test-images/agnhost:2.47
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: STARTUP_DELAY
              value: "20"          # same slow boot as the reference app
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "booting; will be ready in ${STARTUP_DELAY}s"
              sleep "${STARTUP_DELAY}"
              echo "boot complete; serving on :8080"
              exec /agnhost netexec --http-port=8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
          # TOO AGGRESSIVE: starts probing at 1s, kills after 3 failures (~6s),
          # but the app needs 20s to listen. It dies long before it can serve.
          # NO startupProbe to suppress this during boot -> CrashLoopBackOff.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 3
