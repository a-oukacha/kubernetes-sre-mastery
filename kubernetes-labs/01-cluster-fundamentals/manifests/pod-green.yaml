apiVersion: v1
kind: Pod
metadata:
  name: echo-green
  labels:
    app.kubernetes.io/name: echo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "01"
    app: demo          # same app= as echo-blue, so a label selector catches BOTH
    color: green       # but a different color
spec:
  containers:
    - name: echo
      image: registry.k8s.io/e2e-test-images/agnhost:2.47
      args: ["netexec", "--http-port=8080"]
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          memory: 64Mi
