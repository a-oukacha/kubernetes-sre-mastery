apiVersion: v1
kind: Pod
metadata:
  name: echo-blue
  labels:
    app.kubernetes.io/name: echo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "01"
    app: demo          # the selector key you'll query in the lab
    color: blue        # distinguishes this pod from echo-green
  annotations:
    course.note: "non-identifying metadata lives here, not in labels"
spec:
  containers:
    - name: echo
      image: registry.k8s.io/e2e-test-images/agnhost:2.47
      args: ["netexec", "--http-port=8080"]
      ports:
        - containerPort: 8080
      resources:
        requests:        # good-citizen: always request resources
          cpu: 25m
          memory: 32Mi
        limits:
          memory: 64Mi
