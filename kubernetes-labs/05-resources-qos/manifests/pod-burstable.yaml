apiVersion: v1
kind: Pod
metadata:
  name: qos-burstable
  labels:
    app.kubernetes.io/name: qos-demo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "05"
    qos: burstable         # what we expect kubectl to derive
spec:
  containers:
    - name: app
      image: registry.k8s.io/e2e-test-images/agnhost:2.47
      args: ["netexec", "--http-port=8080"]
      ports:
        - containerPort: 8080
      resources:
        # Burstable = it has at least one request, but requests != limits
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
