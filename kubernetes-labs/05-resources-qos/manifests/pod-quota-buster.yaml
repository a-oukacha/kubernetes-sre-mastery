apiVersion: v1
kind: Pod
metadata:
  name: quota-buster
  labels:
    app.kubernetes.io/name: quota-buster
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "05"
spec:
  containers:
    - name: app
      image: registry.k8s.io/e2e-test-images/agnhost:2.47
      args: ["netexec", "--http-port=8080"]
      ports:
        - containerPort: 8080
      resources:
        # This single pod asks for 800Mi of memory requests. The ResourceQuota
        # caps requests.memory at 512Mi for the WHOLE namespace, so admission
        # rejects it: "exceeded quota". It is well-formed (has requests) — it is
        # simply too big for the aggregate budget.
        requests:
          cpu: 100m
          memory: 800Mi
        limits:
          cpu: 200m
          memory: 800Mi
