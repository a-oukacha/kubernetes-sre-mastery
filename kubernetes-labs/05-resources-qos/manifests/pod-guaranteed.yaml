apiVersion: v1
kind: Pod
metadata:
  name: qos-guaranteed
  labels:
    app.kubernetes.io/name: qos-demo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "05"
    qos: guaranteed        # what we expect kubectl to derive
spec:
  containers:
    - name: app
      image: registry.k8s.io/e2e-test-images/agnhost:2.47
      args: ["netexec", "--http-port=8080"]
      ports:
        - containerPort: 8080
      resources:
        # Guaranteed = requests == limits for EVERY resource on EVERY container
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 50m
          memory: 64Mi
