apiVersion: v1
kind: Pod
metadata:
  name: cpu-hog
  labels:
    app.kubernetes.io/name: cpu-hog
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "05"
spec:
  containers:
    - name: stress
      image: polinux/stress:1.0.4
      # Two busy threads want ~2000m of CPU, but the limit caps usage at 200m.
      # CPU is compressible: the kernel THROTTLES (CFS quota) instead of killing.
      # The pod stays Running with 0 restarts — it is just slow.
      command: ["stress"]
      args: ["--cpu", "2", "--timeout", "600s"]
      resources:
        requests:
          cpu: 100m
          memory: 32Mi
        limits:
          cpu: 200m          # hard ceiling => CFS throttling, NOT a kill
          memory: 64Mi
