apiVersion: v1
kind: Pod
metadata:
  name: qos-besteffort
  labels:
    app.kubernetes.io/name: qos-demo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "05"
    qos: besteffort        # what we expect kubectl to derive
spec:
  containers:
    - name: app
      image: registry.k8s.io/e2e-test-images/agnhost:2.47
      args: ["netexec", "--http-port=8080"]
      ports:
        - containerPort: 8080
      # BestEffort = NO requests and NO limits on ANY container.
      # NOTE: this manifest is intentionally a "bad citizen" — it only works
      # BEFORE you apply the ResourceQuota. After the quota exists, admission
      # rejects any pod that declares no requests (you will prove that in Step 7).
