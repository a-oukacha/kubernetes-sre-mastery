# A CustomResourceDefinition (CRD) teaches the API server a NEW kind: Website.
# After this applies, `kubectl get websites` works and the API server stores,
# validates, and versions Website objects exactly like built-in kinds -- with
# no code. A CRD alone is INERT: it is just a new table in etcd. Nothing yet
# turns a Website into running pods. That is the controller's job (next file).
#
# CRD + controller = the OPERATOR pattern: a domain object (Website) plus a
# reconcile loop that encodes the operational knowledge of "how to run a
# website" so a human never has to assemble the Deployment+Service by hand.
#
# NOTE: a CRD is CLUSTER-SCOPED (not namespaced). Deleting the lab namespace
# does NOT remove it -- Cleanup deletes the CRD explicitly.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: websites.example.com
  labels:
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "20"
spec:
  group: example.com
  scope: Namespaced
  names:
    plural: websites
    singular: website
    kind: Website
    shortNames:
      - web
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["image"]
              properties:
                image:
                  type: string
                  description: "Container image to serve."
                replicas:
                  type: integer
                  default: 1
                  minimum: 1
                  maximum: 5
                  description: "How many replicas of the website to run."
            status:
              type: object
              properties:
                phase:
                  type: string
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Phase
          type: string
          jsonPath: .status.phase
