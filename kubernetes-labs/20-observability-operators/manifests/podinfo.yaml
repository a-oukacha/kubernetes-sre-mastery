# The system under observation. podinfo is a production-like Go app that
# exposes a Prometheus /metrics endpoint out of the box (http_requests_total,
# http_request_duration_seconds histogram, etc.) and has endpoints we can use
# to INJECT failure on demand:
#   /status/{code}  -> returns that HTTP status (e.g. /status/500)
#   /delay/{sec}    -> sleeps that many seconds before responding
#   /healthz /readyz-> probes
# We give the Service a named `http` port so the ServiceMonitor can target it
# by NAME (resilient to port-number changes).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
  labels:
    app.kubernetes.io/name: podinfo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "20"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: podinfo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: podinfo
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "20"
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
          command:
            - ./podinfo
            - --port=9898
            - --level=info
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo
  labels:
    app.kubernetes.io/name: podinfo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "20"
spec:
  selector:
    app.kubernetes.io/name: podinfo
  ports:
    - name: http        # named port -> the ServiceMonitor scrapes "http"
      port: 9898
      targetPort: http
