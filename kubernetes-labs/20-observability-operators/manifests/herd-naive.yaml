# THUNDERING HERD demo, part 1 -- the WRONG way.
# 12 client pods all hit a failing endpoint (/status/503) and RETRY in LOCKSTEP
# with a FIXED, tiny gap and NO jitter. Because every client fails at the same
# instant and waits the same fixed time, their retries SYNCHRONIZE into waves:
# the load on the (already struggling) service does not decay -- it pulses at
# full amplitude. When the backend tries to recover, the synchronized wave
# knocks it back down. This is retry amplification = a thundering herd.
#
# Observe: the request rate against podinfo from these clients stays high and
# spiky (the herd), with no decay. Compare with herd-backoff.yaml.
apiVersion: batch/v1
kind: Job
metadata:
  name: herd-naive
  labels:
    app.kubernetes.io/name: herd-naive
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "20"
spec:
  parallelism: 12          # 12 clients all hammering at once
  completions: 12
  backoffLimit: 0
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: herd-naive
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "20"
    spec:
      restartPolicy: Never
      containers:
        - name: client
          image: fortio/fortio:1.60.3
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "naive client starting (no backoff, no jitter)"
              i=0
              # 60 retries, FIXED 1s gap, NO jitter. All 12 pods march in step.
              while [ $i -lt 60 ]; do
                fortio curl -quiet http://podinfo:9898/status/503 >/dev/null 2>&1 || true
                sleep 1                 # <-- fixed, identical for every client
                i=$((i+1))
              done
              echo "naive client done"
          resources:
            requests:
              cpu: 20m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 48Mi
