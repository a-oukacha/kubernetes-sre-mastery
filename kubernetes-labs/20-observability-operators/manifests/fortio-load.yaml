# Steady, well-behaved load against podinfo's root endpoint. All 200s. This is
# the baseline: the SLI ratio stays ~0 errors, the burn-rate alerts stay quiet,
# and Grafana shows a clean RED dashboard (Rate up, Errors flat, Duration low).
#
# fortio runs as a Deployment that loops forever (-t 0). qps 20 is gentle on a
# 2-node lab cluster. Target is the in-cluster Service DNS name.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortio-load
  labels:
    app.kubernetes.io/name: fortio-load
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "20"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fortio-load
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fortio-load
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "20"
    spec:
      containers:
        - name: fortio
          image: fortio/fortio:1.60.3
          imagePullPolicy: IfNotPresent
          args:
            - load
            - -qps=20
            - -t=0            # run forever
            - -c=4            # 4 concurrent connections
            - http://podinfo:9898/
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
