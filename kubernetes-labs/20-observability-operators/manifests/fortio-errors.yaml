# Error-injection load. podinfo's /status/500 endpoint returns HTTP 500 for
# every request, so this Deployment drives the SLI's error ratio UP and BURNS
# the error budget. Running this alongside fortio-load pushes the 5xx share
# well past the 1% budget at >14.4x burn -> the FAST burn-rate alert fires.
#
# This is the SYMPTOM the SLO alert is designed to catch: real user-visible
# failures, regardless of which subsystem caused them.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortio-errors
  labels:
    app.kubernetes.io/name: fortio-errors
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "20"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fortio-errors
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fortio-errors
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "20"
    spec:
      containers:
        - name: fortio
          image: fortio/fortio:1.60.3
          imagePullPolicy: IfNotPresent
          args:
            - load
            - -qps=40
            - -t=0
            - -c=8
            - http://podinfo:9898/status/500   # every response is a 500
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
