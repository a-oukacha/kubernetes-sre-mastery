# The backend fleet: 3 replicas of agnhost netexec.
# /hostname returns the POD NAME, so repeated requests through a Service let you
# watch traffic rotate across endpoints -- that is the "load balancing" you prove.
#
# Readiness is wired as an EXEC check against a sentinel file (/tmp/ready) that the
# image creates at start. In Break-it you `rm /tmp/ready` to flip a pod NotReady on
# demand and watch it leave the EndpointSlice -- agnhost's HTTP endpoints are not
# freely flippable, hence the sentinel (see 00-cluster-setup/tooling.md).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "06"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "06"
    spec:
      containers:
        - name: agnhost
          image: registry.k8s.io/e2e-test-images/agnhost:2.47
          imagePullPolicy: IfNotPresent
          # Create the readiness sentinel, then serve HTTP on :8080.
          command: ["sh", "-c"]
          args:
            - touch /tmp/ready && exec /agnhost netexec --http-port=8080
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/ready"]
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 1
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
