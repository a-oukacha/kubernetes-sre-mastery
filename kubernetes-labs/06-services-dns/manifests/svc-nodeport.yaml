# NodePort: a ClusterIP PLUS a port (30000-32767) opened on EVERY node. Reach the
# app at <any-node-ip>:<nodePort>. kube-proxy DNATs from that node port to a Ready
# endpoint -- which may live on a DIFFERENT node than the one you hit.
# Costs nothing (no cloud LB); it is the building block a LoadBalancer sits on top of.
apiVersion: v1
kind: Service
metadata:
  name: backend-nodeport
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "06"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30806     # pinned so the lab command is deterministic; omit to auto-assign
