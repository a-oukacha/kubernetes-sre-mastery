# Headless Service: clusterIP: None means NO VIP is allocated. DNS returns one A
# record PER READY POD instead of a single VIP. The client (not kube-proxy) picks
# which pod to talk to. This is the addressing model StatefulSets use (lab 10).
# DNS name: backend-headless.lab-06-services-dns.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: backend-headless
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "06"
spec:
  type: ClusterIP
  clusterIP: None        # <-- headless: no VIP, DNS returns pod IPs
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 80
      targetPort: http
