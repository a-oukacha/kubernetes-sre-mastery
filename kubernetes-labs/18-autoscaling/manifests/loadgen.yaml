# In-cluster fortio load generator. Hammers podinfo's POST /token endpoint,
# which signs a JWT per request (real CPU work) — this is what pushes the
# target's CPU above the HPA's 50% goal and makes replicas climb.
#   -qps=0  = go as fast as possible (open the throttle)
#   -c=16   = 16 concurrent connections
#   -t=0    = run forever (delete the deployment to stop the load)
# Scale this Deployment's replicas up/down to dial load in and out.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  labels:
    app.kubernetes.io/name: loadgen
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "18"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loadgen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loadgen
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "18"
    spec:
      containers:
        - name: fortio
          image: fortio/fortio:1.60.3
          args:
            - load
            - -qps=0
            - -c=16
            - -t=0
            - -timeout=2s
            - -X=POST
            - -payload=anon
            - http://podinfo:9898/token
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi
