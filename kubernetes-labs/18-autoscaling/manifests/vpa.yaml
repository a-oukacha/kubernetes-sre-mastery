# OPTIONAL — VPA (Vertical Pod Autoscaler). Requires the VPA controllers
# installed separately (autoscaler/vertical-pod-autoscaler); it is NOT in core
# Kubernetes and most managed clusters do not ship it. updateMode: Off makes
# this RECOMMEND-ONLY: the VPA observes usage and writes a suggested
# requests/limits into status.recommendation WITHOUT mutating pods. Safe to run
# alongside the lab.
#
# DANGER (covered in the lecture): do NOT point a VPA in "Auto"/"Recreate" mode
# at the SAME resource (cpu) that an HPA scales on. They fight — the VPA rewrites
# the request the HPA's percentage is measured against, and the loop thrashes.
# Recommend-mode on CPU is fine; Auto-mode on CPU with an HPA-on-CPU is the trap.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: podinfo
  labels:
    app.kubernetes.io/name: podinfo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "18"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: podinfo
  updatePolicy:
    updateMode: "Off"               # recommend only — never mutates pods
