# Backend A — podinfo 6.7.0, blue UI. Replicated (2 pods) behind a ClusterIP
# Service. The Ingress routes /a here. PODINFO_UI_MESSAGE + the version tag make
# it visibly distinct from backend B in the response body.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-a
  labels:
    app.kubernetes.io/name: backend-a
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "07"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend-a
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-a
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "07"
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
          command:
            - ./podinfo
            - --port=9898
            - --ui-color=#0b5fff
            - --ui-message=backend A — podinfo 6.7.0 (blue)
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-a
  labels:
    app.kubernetes.io/name: backend-a
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "07"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend-a
  ports:
    - name: http
      port: 9898
      targetPort: http
