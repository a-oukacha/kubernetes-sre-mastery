# Backend B — podinfo 6.7.1, green UI. The Ingress routes /b here. The different
# version tag (6.7.1) shows up under /version, so you can prove a request landed
# on B and not A from the response alone.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-b
  labels:
    app.kubernetes.io/name: backend-b
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "07"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend-b
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-b
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "07"
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.7.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
          command:
            - ./podinfo
            - --port=9898
            - --ui-color=#16a34a
            - --ui-message=backend B — podinfo 6.7.1 (green)
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-b
  labels:
    app.kubernetes.io/name: backend-b
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "07"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend-b
  ports:
    - name: http
      port: 9898
      targetPort: http
