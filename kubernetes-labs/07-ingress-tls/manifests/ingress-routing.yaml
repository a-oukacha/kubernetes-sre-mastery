# L7 host + path routing, HTTP only (no TLS yet — that comes next).
# host = lab07.demo.local ; /a -> backend-a , /b -> backend-b.
# ingressClassName MUST match the controller's class ("nginx" for ingress-nginx)
# or the controller ignores this Ingress entirely.
#
# rewrite-target strips the /a (or /b) prefix so podinfo sees "/" — the
# capture group (?:/|$)(.*) -> $2 is the canonical ingress-nginx rewrite recipe.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-routing
  labels:
    app.kubernetes.io/name: demo-ingress
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "07"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: lab07.demo.local
      http:
        paths:
          - path: /a(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-a
                port:
                  number: 9898
          - path: /b(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-b
                port:
                  number: 9898
