# Break it: same load, but aimed STRAIGHT at backend-a (no cache). Every request
# is a real backend hit. /delay/0.1 makes podinfo sleep 100ms per request so a
# modest QPS saturates the 2 small replicas — p99 climbs, errors/timeouts appear.
# Kept deliberately modest (illustrative, not a cluster-harming stress test).
apiVersion: v1
kind: Pod
metadata:
  name: loadgen-direct
  labels:
    app.kubernetes.io/name: loadgen
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "07"
spec:
  restartPolicy: Never
  containers:
    - name: fortio
      image: fortio/fortio:1.60.3
      args:
        - load
        - -qps=80
        - -t=20s
        - -c=8
        - -timeout=2s
        - http://backend-a:9898/delay/0.1
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 300m
          memory: 64Mi
