# Real secret management instead of committing plaintext (Base64 != encryption,
# from lab 04). Two industry approaches are shown as DOCUMENTED STUBS — they
# need an operator installed cluster-wide, which this CPU-only course does not
# require you to install. Read them; apply only if you have the operator.
#
# ---------------------------------------------------------------------------
# OPTION A — External Secrets Operator (ESO).
# A SecretStore points at an external vault (AWS Secrets Manager, HashiCorp
# Vault, OVH-hosted secrets, ...). An ExternalSecret declares "materialize THIS
# vault key into a Kubernetes Secret named app-secret". The operator syncs and
# rotates it. The vault, not Git, holds the value. Requires:
#   helm install external-secrets external-secrets/external-secrets -n external-secrets
# ---------------------------------------------------------------------------
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: vault-store
#   namespace: lab-19-rbac-podsecurity
# spec:
#   provider:
#     # EKS: an AWS Secrets Manager provider authenticated via IRSA on the SA
#     #      (no static keys). OVH: a HashiCorp Vault provider with a token/
#     #      AppRole, since OVH has no IAM-per-pod.
#     aws:
#       service: SecretsManager
#       region: eu-west-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: pod-reader        # SA annotated with the IRSA role ARN
# ---
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: app-secret
#   namespace: lab-19-rbac-podsecurity
# spec:
#   refreshInterval: 1h               # re-pull -> rotation without a redeploy
#   secretStoreRef:
#     name: vault-store
#     kind: SecretStore
#   target:
#     name: app-secret                # the K8s Secret ESO will create/own
#   data:
#     - secretKey: API_TOKEN
#       remoteRef:
#         key: prod/app/api-token     # the path in the external vault
#
# ---------------------------------------------------------------------------
# OPTION B — Sealed Secrets (Bitnami).
# You encrypt a Secret on your laptop with the controller's PUBLIC key
# (`kubeseal`) into a SealedSecret. Only the in-cluster controller's PRIVATE
# key can decrypt it, so the SealedSecret is SAFE TO COMMIT to Git. The
# controller decrypts it into a normal Secret in the cluster. Workflow:
#   kubectl create secret generic app-secret \
#     --from-literal=API_TOKEN=s3cr3t --dry-run=client -o yaml \
#     | kubeseal --format yaml > sealedsecret.yaml   # commit THIS
#   kubectl apply -f sealedsecret.yaml
# The resulting object looks like (encryptedData is ciphertext, not Base64):
# ---------------------------------------------------------------------------
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: app-secret
#   namespace: lab-19-rbac-podsecurity
# spec:
#   encryptedData:
#     API_TOKEN: AgB7c2VhbGVkLWNpcGhlcnRleHQtbm90LWJhc2U2NC4uLg==
#   template:
#     metadata:
#       name: app-secret
#
# Either way: the plaintext NEVER lands in Git, and the in-cluster Secret should
# still sit on top of etcd encryption-at-rest (a separate cluster setting).
{}
