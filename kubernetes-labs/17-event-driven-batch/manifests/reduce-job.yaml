# REDUCE stage of the word-count. A single Job that aggregates the partials the
# map stage left on the shared PVC into ONE final answer.
#
# THE BARRIER: reduce must not run until ALL maps have finished. We do NOT rely
# on starting reduce "after" map by hand -- the reducer itself blocks until it
# sees the expected number of partials (EXPECTED=3). If you launch reduce too
# early it WAITS rather than reading incomplete data (the map/reduce barrier).
# In production you would express this dependency with a workflow engine
# (Argo Workflows / Tekton) or `kubectl wait --for=condition=complete job/...`.
apiVersion: batch/v1
kind: Job
metadata:
  name: wordcount-reduce
  labels:
    app.kubernetes.io/name: wordcount-reduce
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "17"
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wordcount-reduce
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "17"
    spec:
      restartPolicy: Never
      containers:
        - name: reducer
          image: busybox:1.36
          env:
            - name: EXPECTED
              value: "3"          # number of map shards we must wait for
          command:
            - sh
            - -c
            - |
              set -e
              echo "reducer waiting for $EXPECTED partials (the barrier)..."
              # BARRIER: spin until all map partials exist. Bounded wait so a stuck
              # map can't hang reduce forever (fail loudly instead).
              tries=0
              while [ "$(ls /shared/partials/part-*.txt 2>/dev/null | wc -l)" -lt "$EXPECTED" ]; do
                tries=$((tries+1))
                if [ "$tries" -gt 60 ]; then
                  echo "ERROR: only $(ls /shared/partials/part-*.txt 2>/dev/null | wc -l)/$EXPECTED partials after 60s; aborting"
                  exit 1
                fi
                sleep 1
              done
              echo "all $EXPECTED partials present; reducing..."
              # REDUCE: sum every partial into the final word count.
              TOTAL=0
              for f in /shared/partials/part-*.txt; do
                N=$(cat "$f")
                echo "  + $f = $N"
                TOTAL=$((TOTAL + N))
              done
              echo "$TOTAL" > /shared/result.txt
              echo "FINAL_WORD_COUNT=$TOTAL  (written to /shared/result.txt)"
          volumeMounts:
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: mapreduce-shared
