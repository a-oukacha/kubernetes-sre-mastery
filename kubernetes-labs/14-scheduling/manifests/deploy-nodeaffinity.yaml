apiVersion: apps/v1
kind: Deployment
metadata:
  name: pinned
  labels:
    app.kubernetes.io/name: pinned
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "14"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: pinned
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinned
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "14"
    spec:
      affinity:
        nodeAffinity:
          # HARD constraint: only nodes carrying course.disktype=ssd are eligible.
          # No such node -> every replica stays Pending (see Break it).
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: course.disktype
                    operator: In
                    values: ["ssd"]
      containers:
        - name: app
          image: registry.k8s.io/e2e-test-images/agnhost:2.47
          args: ["netexec", "--http-port=8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
