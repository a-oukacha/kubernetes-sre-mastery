apiVersion: v1
kind: Pod
metadata:
  name: no-toleration
  labels:
    app.kubernetes.io/name: tolerate-demo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "14"
spec:
  # No toleration. Once a node is tainted course.dedicated=gpu:NoSchedule this
  # pod is REPELLED from that node. It will land on any other node, or stay
  # Pending if the tainted node is the only candidate.
  containers:
    - name: app
      image: registry.k8s.io/e2e-test-images/agnhost:2.47
      args: ["netexec", "--http-port=8080"]
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
