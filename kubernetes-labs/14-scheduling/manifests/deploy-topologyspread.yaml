apiVersion: apps/v1
kind: Deployment
metadata:
  name: spread-zone
  labels:
    app.kubernetes.io/name: spread-zone
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "14"
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: spread-zone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spread-zone
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "14"
    spec:
      topologySpreadConstraints:
        # Balance replicas across AZs. maxSkew=1 means the busiest zone may hold
        # at most one more replica than the emptiest. The selector MUST match
        # this Deployment's pods, and every node MUST carry the topology label.
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway   # soft: keep scheduling even if skew can't be met
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: spread-zone
      containers:
        - name: app
          image: registry.k8s.io/e2e-test-images/agnhost:2.47
          args: ["netexec", "--http-port=8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
