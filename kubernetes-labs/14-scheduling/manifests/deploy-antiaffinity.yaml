apiVersion: apps/v1
kind: Deployment
metadata:
  name: spread-hostname
  labels:
    app.kubernetes.io/name: spread-hostname
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "14"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: spread-hostname
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spread-hostname
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "14"
    spec:
      affinity:
        podAntiAffinity:
          # SOFT spread: prefer to keep replicas off nodes that already run a
          # replica of this app. topologyKey=hostname means "one per node".
          # preferred -> best-effort: if there are fewer nodes than replicas,
          # the extras still schedule (they double up) instead of going Pending.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: spread-hostname
      containers:
        - name: app
          image: registry.k8s.io/e2e-test-images/agnhost:2.47
          args: ["netexec", "--http-port=8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
