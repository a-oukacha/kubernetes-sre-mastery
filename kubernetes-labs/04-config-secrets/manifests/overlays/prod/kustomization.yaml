apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lab-04-config-secrets

resources:
  - ../../base

# Prod overlay: same shape as dev, different values. `kubectl kustomize` of
# this folder vs overlays/dev renders different GREETING / log level / flags.
patches:
  - target:
      kind: ConfigMap
      name: app-config
    patch: |
      - op: replace
        path: /data/GREETING
        value: "hello from PROD"
      - op: replace
        path: /data/LOG_LEVEL
        value: "warn"
      - op: replace
        path: /data/FEATURE_FLAG
        value: "off"
      - op: replace
        path: /data/app.conf
        value: |
          # rendered config file (mounted, NOT baked into the image)
          greeting   = hello from PROD
          log_level  = warn
          feature.x  = off
          refreshed_from = configmap-volume
