apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lab-04-config-secrets

resources:
  - ../../base

# Replace the whole ConfigMap data block for the dev environment.
# (A full patch keeps GREETING-the-key and app.conf-the-file in sync.)
patches:
  - target:
      kind: ConfigMap
      name: app-config
    patch: |
      - op: replace
        path: /data/GREETING
        value: "hello from DEV"
      - op: replace
        path: /data/LOG_LEVEL
        value: "debug"
      - op: replace
        path: /data/FEATURE_FLAG
        value: "on"
      - op: replace
        path: /data/app.conf
        value: |
          # rendered config file (mounted, NOT baked into the image)
          greeting   = hello from DEV
          log_level  = debug
          feature.x  = on
          refreshed_from = configmap-volume
