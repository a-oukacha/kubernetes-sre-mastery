# A Secret consumed two ways: as a mounted file AND as one env var.
# stringData lets you write plaintext; the API server stores it Base64-encoded
# in etcd. Base64 is ENCODING, NOT ENCRYPTION (the lecture and Break-it prove this).
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  labels:
    app.kubernetes.io/name: config-demo
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "04"
type: Opaque
stringData:
  API_TOKEN: "s3cr3t-token-do-not-leak"
  db-password: "p@ssw0rd-from-secret"
