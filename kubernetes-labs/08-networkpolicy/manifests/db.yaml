# The db tier: the crown jewels. The whole point of segmentation is that ONLY the
# backend may reach it -- never the frontend, never the internet. We use agnhost
# (not a real DB) so the lab stays CPU-only and the probe stays a simple HTTP wget;
# the security lesson is identical regardless of what listens on the port.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app.kubernetes.io/name: db
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "08"
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: db
      tier: db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "08"
        tier: db
    spec:
      containers:
        - name: agnhost
          image: registry.k8s.io/e2e-test-images/agnhost:2.47
          imagePullPolicy: IfNotPresent
          args: ["netexec", "--http-port=8080"]
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
# ClusterIP Service. DNS name: db.lab-08-networkpolicy.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: db
  labels:
    app.kubernetes.io/name: db
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "08"
    tier: db
spec:
  type: ClusterIP
  selector:
    tier: db
  ports:
    - name: http
      port: 8080
      targetPort: http
