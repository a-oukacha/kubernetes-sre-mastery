# The frontend tier: the public-facing edge. In a real app this is what an Ingress
# routes to. It should be allowed to call the backend -- and NOTHING else.
# agnhost netexec serves /hostname (pod name) and acts as an HTTP client we drive
# with `kubectl exec ... wget` to probe connectivity to other tiers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "08"
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      tier: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "08"
        tier: frontend
    spec:
      containers:
        - name: agnhost
          image: registry.k8s.io/e2e-test-images/agnhost:2.47
          imagePullPolicy: IfNotPresent
          args: ["netexec", "--http-port=8080"]
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
# ClusterIP Service. DNS name: frontend.lab-08-networkpolicy.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "08"
    tier: frontend
spec:
  type: ClusterIP
  selector:
    tier: frontend
  ports:
    - name: http
      port: 8080         # we dial :8080 directly in this lab (no :80 indirection)
      targetPort: http
