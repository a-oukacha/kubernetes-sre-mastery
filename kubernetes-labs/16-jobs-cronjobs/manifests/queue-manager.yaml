apiVersion: v1
kind: Pod
metadata:
  name: queue-manager
  labels:
    app.kubernetes.io/name: work-queue
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "16"
spec:
  # Uses the SA from queue-rbac.yaml -> can create Jobs in this namespace.
  serviceAccountName: queue-manager
  restartPolicy: Never
  containers:
    - name: manager
      image: bitnami/kubectl:1.30
      # Read the queue source (a ConfigMap) and create ONE worker Job per item.
      # The worker is a generic busybox; the only per-item difference is the
      # ITEM env var. This is the DDS "Work Queue" shape: generic worker +
      # pluggable queue source.
      command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          echo "manager: reading work items from ConfigMap/work-items"
          ITEMS=$(kubectl get configmap work-items -o jsonpath='{.data.items}')
          for item in $ITEMS; do
            echo "manager: creating worker Job for $item"
            cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: worker-$item
            labels:
              app.kubernetes.io/name: work-queue
              app.kubernetes.io/part-of: k8s-sre-course
              course.lab: "16"
          spec:
            backoffLimit: 2
            ttlSecondsAfterFinished: 300
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: work-queue
                  app.kubernetes.io/part-of: k8s-sre-course
                  course.lab: "16"
              spec:
                restartPolicy: Never
                containers:
                  - name: worker
                    image: busybox:1.36
                    env:
                      - name: ITEM
                        value: "$item"
                    command:
                      - sh
                      - -c
                      - 'echo "processing \$ITEM"; sleep 4; echo "DONE \$ITEM"'
                    resources:
                      requests: { cpu: 25m, memory: 16Mi }
                      limits:   { cpu: 100m, memory: 32Mi }
          EOF
          done
          echo "manager: created one Job per item; done."
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
