apiVersion: batch/v1
kind: Job
metadata:
  name: parallel-pi
  labels:
    app.kubernetes.io/name: parallel-pi
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "16"
spec:
  # Run until 6 pods have SUCCEEDED in total...
  completions: 6
  # ...but never more than 3 pods at the same time.
  parallelism: 3
  # New pod per failure (vs OnFailure = restart in place). Bounds total retries.
  backoffLimit: 4
  template:
    metadata:
      labels:
        app.kubernetes.io/name: parallel-pi
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "16"
    spec:
      # A Job pod must terminate. Never = a fresh pod is created on failure.
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          # Each completion does a little work then prints DONE.
          command:
            - sh
            - -c
            - 'echo "worker $HOSTNAME starting"; sleep 5; echo "DONE $HOSTNAME"'
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
