apiVersion: batch/v1
kind: Job
metadata:
  name: indexed-shards
  labels:
    app.kubernetes.io/name: indexed-shards
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "16"
spec:
  completions: 6
  parallelism: 3
  # Indexed mode: each pod gets a STABLE index 0..completions-1 in
  # JOB_COMPLETION_INDEX. Each index runs exactly once on success.
  completionMode: Indexed
  backoffLimit: 4
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: indexed-shards
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "16"
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          # Each pod processes ONLY its own slice, derived from its index.
          # No coordination, no shared queue: the index IS the partition key.
          command:
            - sh
            - -c
            - 'echo "shard ${JOB_COMPLETION_INDEX} processing item-${JOB_COMPLETION_INDEX}"; sleep 3; echo "shard ${JOB_COMPLETION_INDEX} DONE"'
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
