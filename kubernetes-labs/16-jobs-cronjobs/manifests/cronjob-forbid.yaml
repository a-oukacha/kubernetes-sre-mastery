apiVersion: batch/v1
kind: CronJob
metadata:
  name: slow-tick
  labels:
    app.kubernetes.io/name: slow-tick
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "16"
spec:
  # Fire every minute.
  schedule: "* * * * *"
  # Forbid = if the previous run is still going when the next is due, SKIP it.
  # (Allow = run concurrently; Replace = kill the old run, start the new one.)
  concurrencyPolicy: Forbid
  # If the controller misses the scheduled time by more than this, give up on
  # that run rather than firing late. Guards against backlog after an outage.
  startingDeadlineSeconds: 30
  # Keep the controller's object history small.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: slow-tick
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "16"
    spec:
      # Finished Jobs (and their pods) auto-delete this many seconds after
      # finishing, so completed objects don't pile up forever.
      ttlSecondsAfterFinished: 120
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: slow-tick
            app.kubernetes.io/part-of: k8s-sre-course
            course.lab: "16"
        spec:
          restartPolicy: Never
          containers:
            - name: tick
              image: busybox:1.36
              # Deliberately runs LONGER than the 1-minute interval, so the
              # next scheduled run overlaps -> gets skipped under Forbid.
              command:
                - sh
                - -c
                - 'echo "tick start $(date +%T)"; sleep 90; echo "tick end $(date +%T)"'
              resources:
                requests:
                  cpu: 25m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 32Mi
