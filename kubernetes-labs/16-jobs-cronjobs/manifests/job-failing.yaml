apiVersion: batch/v1
kind: Job
metadata:
  name: always-fails
  labels:
    app.kubernetes.io/name: always-fails
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "16"
spec:
  # Bound the retries. After 3 failed pods the Job is marked Failed with
  # reason BackoffLimitExceeded -- it does NOT retry forever.
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: always-fails
        app.kubernetes.io/part-of: k8s-sre-course
        course.lab: "16"
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          # Always exits non-zero -> every pod fails -> retries with exponential
          # backoff (10s, 20s, 40s...) until backoffLimit is exhausted.
          command:
            - sh
            - -c
            - 'echo "attempt by $HOSTNAME, exiting 1"; exit 1'
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
