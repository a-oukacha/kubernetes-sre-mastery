# A tiny client pod for resolving the StatefulSet's per-pod DNS names and for
# poking redis. busybox gives you nslookup; we add no PVC (this pod is stateless).
apiVersion: v1
kind: Pod
metadata:
  name: client
  labels:
    app.kubernetes.io/name: client
    app.kubernetes.io/part-of: k8s-sre-course
    course.lab: "10"
spec:
  containers:
    - name: client
      image: busybox:1.36
      command: ["sh", "-c", "sleep 86400"]
      resources:
        requests: { cpu: 10m, memory: 16Mi }
        limits:   { cpu: 50m, memory: 64Mi }
