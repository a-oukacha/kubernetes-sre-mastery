# The agent that covers EVERY node, including tainted ones.
# A real observability agent must see ALL nodes -> it tolerates every taint.
# Here we explicitly tolerate the lab taint  dedicated=special:NoSchedule
# (and the common control-plane taints so the agent covers them too).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent-tolerant
  labels:
    app: node-agent-tolerant
    course.lab: "15"
    role: node-agent
spec:
  selector:
    matchLabels:
      app: node-agent-tolerant
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: node-agent-tolerant
        course.lab: "15"
        role: node-agent
    spec:
      # Higher priority: a node agent should survive preemption.
      priorityClassName: node-agent-critical
      tolerations:
        # the taint this lab adds in Break it / Steps
        - key: dedicated
          operator: Equal
          value: special
          effect: NoSchedule
        # cover control-plane nodes too (common in self-managed clusters)
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: agent
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - 'echo "tolerant-agent up on node=$NODE_NAME"; while true; do echo "$(date -u) heartbeat from $NODE_NAME"; sleep 30; done'
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      terminationGracePeriodSeconds: 5
