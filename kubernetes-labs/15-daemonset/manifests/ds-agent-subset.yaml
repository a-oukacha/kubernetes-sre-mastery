# Same agent, but RESTRICTED to a subset of nodes via nodeSelector.
# Only nodes carrying the label  agentpool=observed  will get a pod.
# This is how you target "just the GPU pool" or "just the ingress nodes".
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent-subset
  labels:
    app: node-agent-subset
    course.lab: "15"
    role: node-agent
spec:
  selector:
    matchLabels:
      app: node-agent-subset
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: node-agent-subset
        course.lab: "15"
        role: node-agent
    spec:
      nodeSelector:
        agentpool: observed       # <-- only labeled nodes match
      containers:
        - name: agent
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - 'echo "subset-agent up on node=$NODE_NAME"; while true; do echo "$(date -u) heartbeat from $NODE_NAME"; sleep 30; done'
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      terminationGracePeriodSeconds: 5
