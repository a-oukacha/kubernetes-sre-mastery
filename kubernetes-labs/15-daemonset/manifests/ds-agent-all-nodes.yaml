# A node agent that should land on EVERY (untainted) node.
# Stand-in for a log shipper / metrics agent (fluent-bit, node-exporter, ...).
# busybox sleep/log loop: CPU-only, harmless, pinned.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  labels:
    app: node-agent
    course.lab: "15"
    role: node-agent
spec:
  selector:
    matchLabels:
      app: node-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: node-agent
        course.lab: "15"
        role: node-agent
    spec:
      # Make the pod report which node it runs on (you'll read this in logs).
      containers:
        - name: agent
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - 'echo "node-agent up on node=$NODE_NAME"; while true; do echo "$(date -u) heartbeat from $NODE_NAME"; sleep 30; done'
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      terminationGracePeriodSeconds: 5
